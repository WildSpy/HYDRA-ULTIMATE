name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - run: python -m pip install --disable-pip-version-check -r requirements-dev.lock
      - run: ruff check main.py hydra tests .github/scripts/release_notes.py
      - run: python -m pytest -q
      - run: python .github/scripts/release_notes.py "${GITHUB_REF_NAME}" --output release-notes.md

  integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - run: |
          python -m pip install --disable-pip-version-check -r requirements-dev.lock
          sudo apt-get update -qq
          sudo apt-get install -y -qq nftables iptables
      - run: sudo --preserve-env=PATH bash .github/scripts/linux-integration-smoke.sh

  publish:
    needs: [verify, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python .github/scripts/release_notes.py "${GITHUB_REF_NAME}" --output release-notes.md
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "HYDRA $GITHUB_REF_NAME" --notes-file release-notes.md
